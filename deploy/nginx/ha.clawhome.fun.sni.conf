map $http_upgrade $stratpilot_connection_upgrade {
  default upgrade;
  '' close;
}

upstream stratpilot_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream stratpilot_api {
  server 127.0.0.1:8000;
  keepalive 16;
}

server {
  listen 80;
  listen [::]:80;
  server_name ha.clawhome.fun;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ha.clawhome.fun;

  ssl_certificate /etc/letsencrypt/live/ha.clawhome.fun/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ha.clawhome.fun/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://stratpilot_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location = /health {
    proxy_pass http://stratpilot_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ~ ^/(docs|redoc|openapi.json)$ {
    proxy_pass http://stratpilot_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://stratpilot_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $stratpilot_connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
